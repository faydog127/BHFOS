services:
  n8n:
    image: n8nio/n8n:1.117.3
    container_name: n8n-command-center
    restart: unless-stopped
    ports:
      - "${N8N_HOST_PORT:-5679}:5678"
    env_file:
      # Local-only secrets/config. See `.env.n8n.example`.
      - .env.n8n
    environment:
      # Core
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_PORT=5678
      - N8N_PROTOCOL=${N8N_PROTOCOL:-http}
      - GENERIC_TIMEZONE=${GENERIC_TIMEZONE:-America/New_York}
      - WEBHOOK_URL=${WEBHOOK_URL:-http://localhost:${N8N_HOST_PORT:-5679}/}

      # SQLite defaults (explicit)
      - DB_TYPE=sqlite
      - DB_SQLITE_POOL_SIZE=${DB_SQLITE_POOL_SIZE:-5}
    volumes:
      - n8n_data:/home/node/.n8n
      - ./tools/n8n/workflows:/workflows:ro
      - ./docs/review-board:/contracts:ro

volumes:
  n8n_data: {}
