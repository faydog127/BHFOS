name: Ledger Lock

on:
  pull_request:
    paths:
      - 'command-center/tmp/billing-ledger-php/**'
      - 'command-center/tmp/orchestrator-v2/**'
      - 'command-center/tools/review-gate.mjs'
      - 'command-center/review-policy.json'
      - 'command-center/review-input.json'
      - 'command-center/docs/reconciliation/lock/**'
      - 'command-center/docs/governance/**'
      - '.github/workflows/ledger-lock.yml'
  push:
    branches:
      - main
    paths:
      - 'command-center/tmp/billing-ledger-php/**'
      - 'command-center/tmp/orchestrator-v2/**'
      - 'command-center/tools/review-gate.mjs'
      - 'command-center/review-policy.json'
      - 'command-center/review-input.json'
      - 'command-center/docs/reconciliation/lock/**'
      - 'command-center/docs/governance/**'
      - '.github/workflows/ledger-lock.yml'

jobs:
  ledger_lock:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: command-center
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Docker info
        run: docker version

      - name: Review gate
        run: npm run review:gate

      - name: Ledger deck (DB-backed)
        run: pwsh -NoProfile -File ./tmp/billing-ledger-php/tests/run.ps1

      - name: Layer 2 baseline evaluation
        run: pwsh -NoProfile -File ./tmp/orchestrator-v2/runner/ci_layer2_eval.ps1
