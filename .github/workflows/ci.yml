name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  review-gate:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    defaults:
      run:
        working-directory: command-center
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.1

      - name: Review gate (v1)
        env:
          GATE_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          GATE_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: node tools/review-gate.mjs

  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: command-center
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.1
          cache: npm
          cache-dependency-path: command-center/package-lock.json

      - name: Validate Vercel config
        working-directory: .
        run: node tools/validate-vercel-json.mjs

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

  build:
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: command-center
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.1
          cache: npm
          cache-dependency-path: command-center/package-lock.json

      - name: Validate Vercel config
        working-directory: .
        run: node tools/validate-vercel-json.mjs

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build:local
