name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: command-center
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.1
          cache: npm
          cache-dependency-path: command-center/package-lock.json

      - name: Validate Vercel config
        working-directory: .
        run: node tools/validate-vercel-json.mjs

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

  build:
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: command-center
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.1
          cache: npm
          cache-dependency-path: command-center/package-lock.json

      - name: Validate Vercel config
        working-directory: .
        run: node tools/validate-vercel-json.mjs

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build:local
